name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_NO_DOCTOR: 1

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-7.6" >> $GITHUB_ENV
          echo "$PWD/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-translator-spirit-apk
          path: android/app/build/outputs/apk/debug/*.apk
