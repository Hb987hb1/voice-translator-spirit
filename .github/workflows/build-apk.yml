name: Build APK (Expo)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_NO_DOCTOR: 1

      - name: Fix Kotlin compatibility
        run: |
          # 在 gradle.properties 中跳过 Kotlin 版本检查
          echo "kotlin.compiler.skip-metadata-version-check=true" >> android/gradle.properties
          # 或者用更兼容的 Kotlin 版本
          echo "kotlin.version=1.9.24" >> android/gradle.properties

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dkotlin.compiler.skip-metadata-version-check=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-translator-spirit-apk
          path: android/app/build/outputs/apk/debug/*.apk
