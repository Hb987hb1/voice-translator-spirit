name: Build APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: |
          rm -f package-lock.json
          rm -rf android node_modules
          npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_NO_DOCTOR: 1

      - name: Fix Gradle wrapper to 8.2
        run: |
          cd android
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'ENDOFFILE'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
ENDOFFILE

      - name: Build with debug output
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
          echo "=== EXIT CODE: $? ==="

      - name: Show error if failed
        if: failure()
        run: |
          cat android/build.log 2>/dev/null | grep -E "(FAILED|error:|BUILD FAIL|Kotlin|incompatible)" | tail -20

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
