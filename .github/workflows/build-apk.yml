name: Build APK (Expo)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf android
          npm install --legacy-peer-deps

      - name: Prebuild
        run: npx expo prebuild --platform android
        env:
          EXPO_NO_DOCTOR: 1

      - name: Set Kotlin compiler to 2.0.21
        run: |
          # 通过 gradle.properties 指定 Kotlin 版本和跳过元数据检查
          cat >> android/gradle.properties << 'EOF'
kotlin.compiler.skip-metadata-version-check=true
kotlin.code.style=official
android.useAndroidX=true
android.enableJetifier=true
newArchEnabled=true
hermesEnabled=true
EOF

      - name: Build APK with gradle and skip metadata check
        run: |
          cd android
          chmod +x gradlew
          export KOTLIN_DAEMON_JVM_ARGS="-Dkotlin.compiler.skip-metadata-version-check=true"
          ./gradlew assembleDebug --no-daemon             -Dorg.gradle.jvmargs="-Xmx4g -Dkotlin.compiler.skip-metadata-version-check=true"             -Pkotlin.compiler.skip-metadata-version-check=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-translator-spirit-apk
          path: android/app/build/outputs/apk/debug/*.apk
