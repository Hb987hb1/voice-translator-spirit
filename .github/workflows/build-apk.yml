name: Build APK (EAS)

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build APK with EAS
        run: npx eas-cli build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK and upload as artifact
        run: |
          echo "Build submitted - check Expo dashboard"
          echo "APK will need to be downloaded once build completes"
